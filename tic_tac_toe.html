<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tic-Tac-Toe | Task-03</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #1a1060 0%, #2a1fa0 50%, #1a1060 100%);
    color: #fff;
  }
  #app {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 2rem 2.5rem;
    max-width: 440px;
    width: 95vw;
    text-align: center;
    backdrop-filter: blur(8px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px; }
  .sub { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 1.5rem; }
  .badge {
    display: inline-block; background: #f0b429; color: #1a1060;
    font-size: 11px; font-weight: 700; padding: 3px 10px;
    border-radius: 20px; margin-bottom: 1.2rem; letter-spacing: 0.5px;
  }
  .mode-toggle { display: flex; gap: 8px; justify-content: center; margin-bottom: 1.5rem; }
  .mode-btn {
    padding: 7px 22px; border-radius: 20px;
    border: 1.5px solid rgba(255,255,255,0.3);
    background: transparent; color: rgba(255,255,255,0.6);
    font-size: 13px; cursor: pointer; transition: all 0.15s; font-family: inherit;
  }
  .mode-btn.active {
    background: rgba(255,255,255,0.18); color: #fff;
    border-color: rgba(255,255,255,0.7); font-weight: 600;
  }
  .score-row { display: flex; justify-content: center; gap: 10px; margin-bottom: 1.2rem; }
  .score-card {
    background: rgba(255,255,255,0.1); border-radius: 12px;
    padding: 8px 18px; min-width: 80px;
    border: 1px solid rgba(255,255,255,0.12);
  }
  .score-label { font-size: 11px; color: rgba(255,255,255,0.5); margin-bottom: 2px; }
  .score-val { font-size: 22px; font-weight: 700; }
  .score-val.x-c { color: #7fc3ff; }
  .score-val.o-c { color: #ffaa7f; }
  .status {
    height: 34px; display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.7);
    margin-bottom: 1rem; transition: color 0.2s;
  }
  .status.win { color: #5dca94; font-size: 15px; }
  .status.draw { color: #f0b429; }
  .board {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 10px; margin: 0 auto 1.5rem; max-width: 300px;
  }
  .cell {
    aspect-ratio: 1; border-radius: 14px;
    background: rgba(255,255,255,0.09);
    border: 1.5px solid rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 44px; font-weight: 700; cursor: pointer;
    transition: background 0.12s, transform 0.08s;
    user-select: none;
  }
  .cell:hover:not(.taken) { background: rgba(255,255,255,0.18); }
  .cell:active:not(.taken) { transform: scale(0.93); }
  .cell.x { color: #7fc3ff; }
  .cell.o { color: #ffaa7f; }
  .cell.win-cell { border-color: #5dca94; border-width: 2px; background: rgba(93,202,148,0.15); }
  .restart-btn {
    padding: 9px 32px; border-radius: 24px;
    border: 1.5px solid rgba(255,255,255,0.35);
    background: rgba(255,255,255,0.1); color: #fff;
    font-size: 14px; font-weight: 500; cursor: pointer;
    transition: background 0.12s; font-family: inherit;
  }
  .restart-btn:hover { background: rgba(255,255,255,0.2); }
  .thinking { opacity: 0.5; pointer-events: none; }
  .footer { margin-top: 1.5rem; font-size: 11px; color: rgba(255,255,255,0.3); }
</style>
</head>
<body>
<div id="app">
  <div class="badge">TASK-03</div>
  <h1>Tic-Tac-Toe</h1>
  <p class="sub">HTML · CSS · JavaScript</p>

  <div class="mode-toggle">
    <button class="mode-btn active" id="pvp-btn" onclick="setMode('pvp')">👤 2 Players</button>
    <button class="mode-btn" id="ai-btn" onclick="setMode('ai')">🤖 vs AI</button>
  </div>

  <div class="score-row">
    <div class="score-card">
      <div class="score-label" id="p1-label">Player X</div>
      <div class="score-val x-c" id="score-x">0</div>
    </div>
    <div class="score-card">
      <div class="score-label">Draws</div>
      <div class="score-val" style="color:rgba(255,255,255,0.6)" id="score-d">0</div>
    </div>
    <div class="score-card">
      <div class="score-label" id="p2-label">Player O</div>
      <div class="score-val o-c" id="score-o">0</div>
    </div>
  </div>

  <div class="status" id="status">Player X's turn</div>

  <div class="board" id="board">
    <div class="cell" id="c0" onclick="move(0)"></div>
    <div class="cell" id="c1" onclick="move(1)"></div>
    <div class="cell" id="c2" onclick="move(2)"></div>
    <div class="cell" id="c3" onclick="move(3)"></div>
    <div class="cell" id="c4" onclick="move(4)"></div>
    <div class="cell" id="c5" onclick="move(5)"></div>
    <div class="cell" id="c6" onclick="move(6)"></div>
    <div class="cell" id="c7" onclick="move(7)"></div>
    <div class="cell" id="c8" onclick="move(8)"></div>
  </div>

  <button class="restart-btn" onclick="restart()">↺ New Game</button>
  <p class="footer">Built with HTML · CSS · JavaScript &nbsp;|&nbsp; AI uses Minimax Algorithm</p>
</div>

<script>
  let board = Array(9).fill(null);
  let current = 'X';
  let gameOver = false;
  let mode = 'pvp';
  let scores = { X: 0, O: 0, D: 0 };
  const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

  function setMode(m) {
    mode = m;
    document.getElementById('pvp-btn').classList.toggle('active', m === 'pvp');
    document.getElementById('ai-btn').classList.toggle('active', m === 'ai');
    document.getElementById('p2-label').textContent = m === 'ai' ? 'AI (O)' : 'Player O';
    restart();
  }

  function move(i) {
    if (gameOver || board[i]) return;
    if (mode === 'ai' && current === 'O') return;
    makeMove(i);
    if (!gameOver && mode === 'ai' && current === 'O') {
      document.getElementById('board').classList.add('thinking');
      setTimeout(() => {
        aiMove();
        document.getElementById('board').classList.remove('thinking');
      }, 350);
    }
  }

  function makeMove(i) {
    board[i] = current;
    const cell = document.getElementById('c' + i);
    cell.textContent = current;
    cell.classList.add('taken', current.toLowerCase());

    const result = checkWin();
    if (result) {
      result.forEach(idx => document.getElementById('c' + idx).classList.add('win-cell'));
      const st = document.getElementById('status');
      const who = mode === 'ai' && current === 'O' ? 'AI wins! 🤖' : `Player ${current} wins! 🎉`;
      st.textContent = who;
      st.className = 'status win';
      scores[current]++;
      document.getElementById('score-' + current.toLowerCase()).textContent = scores[current];
      gameOver = true;
    } else if (board.every(v => v)) {
      const st = document.getElementById('status');
      st.textContent = "It's a draw! 🤝";
      st.className = 'status draw';
      scores.D++;
      document.getElementById('score-d').textContent = scores.D;
      gameOver = true;
    } else {
      current = current === 'X' ? 'O' : 'X';
      const who = mode === 'ai' && current === 'O' ? 'AI is thinking…' : `Player ${current}'s turn`;
      const st = document.getElementById('status');
      st.textContent = who;
      st.className = 'status';
    }
  }

  function checkWin() {
    for (const w of wins) {
      if (w.every(i => board[i] === current)) return w;
    }
    return null;
  }

  function aiMove() {
    let best = -Infinity, bestIdx = -1;
    for (let i = 0; i < 9; i++) {
      if (!board[i]) {
        board[i] = 'O';
        const s = minimax(board, 0, false);
        board[i] = null;
        if (s > best) { best = s; bestIdx = i; }
      }
    }
    if (bestIdx >= 0) makeMove(bestIdx);
  }

  function minimax(b, depth, isMax) {
    const wX = wins.some(w => w.every(i => b[i] === 'X'));
    const wO = wins.some(w => w.every(i => b[i] === 'O'));
    if (wO) return 10 - depth;
    if (wX) return depth - 10;
    if (b.every(v => v)) return 0;
    if (isMax) {
      let best = -Infinity;
      for (let i = 0; i < 9; i++) {
        if (!b[i]) { b[i] = 'O'; best = Math.max(best, minimax(b, depth+1, false)); b[i] = null; }
      }
      return best;
    } else {
      let best = Infinity;
      for (let i = 0; i < 9; i++) {
        if (!b[i]) { b[i] = 'X'; best = Math.min(best, minimax(b, depth+1, true)); b[i] = null; }
      }
      return best;
    }
  }

  function restart() {
    board = Array(9).fill(null);
    current = 'X';
    gameOver = false;
    for (let i = 0; i < 9; i++) {
      const c = document.getElementById('c' + i);
      c.textContent = '';
      c.className = 'cell';
    }
    const st = document.getElementById('status');
    st.textContent = "Player X's turn";
    st.className = 'status';
  }
</script>
</body>
</html>
